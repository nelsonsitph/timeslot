<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindful Balance</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --ring-color: rgba(255, 255, 255, 0.1);
            --ball-color: #38bdf8;
            --success-color: #34d399;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            touch-action: none; /* Prevents pull-to-refresh on mobile */
        }

        .header {
            position: absolute;
            top: 10%;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }

        p {
            color: #94a3b8;
            margin: 0;
            font-size: 1.1rem;
        }

        /* The play area */
        .board {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--ring-color);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }

        /* The center target */
        .target {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px dashed rgba(255, 255, 255, 0.3);
            position: absolute;
            transition: border-color 0.3s ease, background-color 0.3s ease;
        }

        /* The moving ball */
        .ball {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--ball-color);
            position: absolute;
            box-shadow: 0 0 20px var(--ball-color);
            /* Smooth interpolation so it doesn't jitter */
            transition: transform 0.1s cubic-bezier(0.25, 1, 0.5, 1), background-color 0.3s ease;
            will-change: transform;
        }

        .start-btn {
            position: absolute;
            bottom: 15%;
            padding: 16px 32px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            background: white;
            color: var(--bg-color);
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.1);
            transition: transform 0.2s ease;
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        /* Success animation */
        .success-glow {
            border-color: var(--success-color) !important;
            background-color: rgba(52, 211, 153, 0.2);
            box-shadow: 0 0 40px var(--success-color);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Find Your Center</h1>
        <p id="instructionText">Hold the device flat</p>
    </div>

    <div class="board" id="board">
        <div class="target" id="target"></div>
        <div class="ball" id="ball"></div>
    </div>

    <button class="start-btn" id="startBtn">Start Balancing</button>

    <script>
        const ball = document.getElementById('ball');
        const target = document.getElementById('target');
        const startBtn = document.getElementById('startBtn');
        const instructionText = document.getElementById('instructionText');
        
        // Configuration for the board size
        const maxMovement = 130; // Max pixels the ball can move from center
        let timer = null;
        let isSuccess = false;

        startBtn.addEventListener('click', async () => {
            // iOS 13+ requires explicit permission for device orientation
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        startListening();
                    } else {
                        instructionText.innerText = "Permission denied. Cannot play.";
                    }
                } catch (error) {
                    console.error(error);
                }
            } else {
                // Non-iOS 13+ devices
                startListening();
            }
        });

        function startListening() {
            startBtn.style.display = 'none';
            instructionText.innerText = "Tilt to keep the blue dot inside the circle";
            window.addEventListener('deviceorientation', handleOrientation);
        }

        function handleOrientation(event) {
            if (isSuccess) return;

            // Beta is front-to-back tilt in degrees (-180 to 180)
            // Gamma is left-to-right tilt in degrees (-90 to 90)
            let xTilt = event.gamma; 
            let yTilt = event.beta;

            // Constrain the tilt to a manageable range (e.g., -45 to 45 degrees)
            if (xTilt > 45) xTilt = 45;
            if (xTilt < -45) xTilt = -45;
            if (yTilt > 45) yTilt = 45;
            if (yTilt < -45) yTilt = -45;

            // Map the tilt degrees to pixels on the screen
            const xPos = (xTilt / 45) * maxMovement;
            const yPos = (yTilt / 45) * maxMovement;

            // Apply the movement using CSS transform for hardware acceleration
            ball.style.transform = `translate(${xPos}px, ${yPos}px)`;

            // Check if the ball is within the center target
            // The target is 80px wide, so the ball (40px) is "inside" if it's within roughly 20px of center
            const distanceFromCenter = Math.sqrt(xPos * xPos + yPos * yPos);

            if (distanceFromCenter < 20) {
                if (!timer) {
                    // Start the 3-second hold timer
                    target.style.borderColor = "var(--success-color)";
                    instructionText.innerText = "Hold it steady...";
                    
                    timer = setTimeout(() => {
                        isSuccess = true;
                        ball.style.backgroundColor = "var(--success-color)";
                        target.classList.add('success-glow');
                        instructionText.innerText = "Great job! You are balanced.";
                        window.removeEventListener('deviceorientation', handleOrientation);
                    }, 3000);
                }
            } else {
                // Reset if they slip out
                if (timer) {
                    clearTimeout(timer);
                    timer = null;
                    target.style.borderColor = "rgba(255, 255, 255, 0.3)";
                    instructionText.innerText = "Tilt to keep the blue dot inside the circle";
                }
            }
        }
    </script>
</body>
</html>
