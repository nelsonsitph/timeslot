<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensory Physics Canvas</title>
    <style>
        :root {
            --bg-color: #0f172a;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: none; /* Prevents scrolling when dragging on mobile */
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .overlay {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: 2px;
        }
        
        p {
            margin: 5px 0 0 0;
            font-size: 0.9rem;
        }

        #clearBtn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            font-size: 1rem;
            transition: background 0.2s;
            pointer-events: auto;
        }

        #clearBtn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="overlay">
        <h1>Sensory Bubbles</h1>
        <p>Touch and drag to create. Swipe to push.</p>
    </div>

    <button id="clearBtn">Clear Canvas</button>

    <canvas id="physicsCanvas"></canvas>

    <script>
        const canvas = document.getElementById('physicsCanvas');
        const ctx = canvas.getContext('2d');
        const clearBtn = document.getElementById('clearBtn');

        // Resize canvas to fill window
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Physics variables
        const gravity = 0.4;
        const friction = 0.8;
        const bounce = 0.6;
        let balls = [];
        
        // Soft, calming color palette
        const colors = ['#38bdf8', '#818cf8', '#a78bfa', '#f472b6', '#fbbf24', '#34d399'];

        class Ball {
            constructor(x, y, vx, vy, radius, color) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.radius = radius;
                this.color = color;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();
            }

            update() {
                // Apply gravity
                this.vy += gravity;

                // Move ball
                this.x += this.vx;
                this.y += this.vy;

                // Floor collision
                if (this.y + this.radius >= canvas.height) {
                    this.y = canvas.height - this.radius;
                    this.vy = -this.vy * bounce;
                    this.vx *= friction; // Friction applies when hitting the ground
                }

                // Wall collisions
                if (this.x + this.radius >= canvas.width) {
                    this.x = canvas.width - this.radius;
                    this.vx = -this.vx * bounce;
                } else if (this.x - this.radius <= 0) {
                    this.x = this.radius;
                    this.vx = -this.vx * bounce;
                }

                this.draw();
            }
        }

        // Interaction logic (Mouse & Touch)
        let isPointerDown = false;
        let lastPointer = { x: 0, y: 0 };

        function handlePointerDown(e) {
            isPointerDown = true;
            updatePointerPos(e);
            spawnBalls(lastPointer.x, lastPointer.y, 3);
        }

        function handlePointerMove(e) {
            if (!isPointerDown) return;
            
            const currentX = e.clientX || (e.touches && e.touches[0].clientX);
            const currentY = e.clientY || (e.touches && e.touches[0].clientY);
            
            // Calculate velocity based on drag speed
            const dx = currentX - lastPointer.x;
            const dy = currentY - lastPointer.y;
            
            // Push existing balls if we drag over them
            for (let ball of balls) {
                const dist = Math.hypot(ball.x - currentX, ball.y - currentY);
                if (dist < ball.radius + 40) {
                    ball.vx += dx * 0.1;
                    ball.vy += dy * 0.1;
                }
            }

            spawnBalls(currentX, currentY, 1);
            updatePointerPos(e);
        }

        function handlePointerUp() {
            isPointerDown = false;
        }

        function updatePointerPos(e) {
            lastPointer.x = e.clientX || (e.touches && e.touches[0].clientX);
            lastPointer.y = e.clientY || (e.touches && e.touches[0].clientY);
        }

        function spawnBalls(x, y, count) {
            // Prevent spawning too many to maintain performance
            if (balls.length > 400) {
                balls.splice(0, count); // remove oldest
            }

            for (let i = 0; i < count; i++) {
                const radius = Math.random() * 15 + 10;
                const color = colors[Math.floor(Math.random() * colors.length)];
                // Give them a slight random burst velocity
                const vx = (Math.random() - 0.5) * 10;
                const vy = (Math.random() - 0.5) * 10;
                balls.push(new Ball(x, y, vx, vy, radius, color));
            }
        }

        // Event Listeners
        canvas.addEventListener('mousedown', handlePointerDown);
        window.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('mouseup', handlePointerUp);

        canvas.addEventListener('touchstart', handlePointerDown, {passive: false});
        window.addEventListener('touchmove', handlePointerMove, {passive: false});
        window.addEventListener('touchend', handlePointerUp);

        clearBtn.addEventListener('click', () => {
            balls = [];
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            // Slightly transparent clear creates a motion blur effect
            ctx.fillStyle = 'rgba(15, 23, 42, 0.3)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < balls.length; i++) {
                balls[i].update();
            }
        }

        animate();
    </script>
</body>
</html>
