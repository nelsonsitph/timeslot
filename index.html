<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>獎勵計劃 - Reward Share</title>
    <style>
        :root {
            --bg-color: #fdf4ff;
            --card-bg: #ffffff;
            --text-main: #4a044e;
            --accent: #d946ef;
            --gold: #fbbf24;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .reward-card {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(217, 70, 239, 0.15);
            text-align: center;
            max-width: 350px;
            width: 100%;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(217, 70, 239, 0.1);
        }

        /* Decorative background element */
        .reward-card::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.2), transparent);
            border-radius: 50%;
            z-index: 0;
        }

        .icon-container {
            font-size: 4rem;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
            text-shadow: 0 10px 20px rgba(251, 191, 36, 0.4);
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 1.8rem;
            margin: 10px 0;
            position: relative;
            z-index: 1;
        }

        .student-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--accent);
            margin: 5px 0 15px 0;
            position: relative;
            z-index: 1;
        }

        .achievement-text {
            font-size: 1.1rem;
            color: #701a75;
            line-height: 1.5;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .share-btn {
            background: linear-gradient(135deg, var(--accent), #c026d3);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(192, 38, 211, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            z-index: 1;
        }

        .share-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(192, 38, 211, 0.4);
        }

        .share-btn:active {
            transform: translateY(1px);
        }

        .fallback-msg {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #94a3b8;
            display: none;
        }
    </style>
</head>
<body>

    <div class="reward-card" id="captureArea">
        <div class="icon-container">🏆</div>
        <h1>獎勵計劃</h1>
        <div class="student-name">Amazing Job!</div>
        <div class="achievement-text">
            Successfully completed the "Taking Turns" social communication activity today.
        </div>
        
        <button class="share-btn" id="shareBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="18" cy="5" r="3"></circle>
                <circle cx="6" cy="12" r="3"></circle>
                <circle cx="18" cy="19" r="3"></circle>
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
            </svg>
            Share with Parents
        </button>
        <div class="fallback-msg" id="fallbackMsg">Link copied to clipboard!</div>
    </div>

    <script>
        const shareBtn = document.getElementById('shareBtn');
        const fallbackMsg = document.getElementById('fallbackMsg');

        // The data we want to send to the parent
        const shareData = {
            title: '獎勵計劃 Update',
            text: 'Amazing Job! Successfully completed the "Taking Turns" social communication activity today. 🏆',
            // url: 'https://your-school-portal.edu/student-progress' // Optional: Link to a portal
        };

        shareBtn.addEventListener('click', async () => {
            // Check if the native Web Share API is supported by the browser/device
            if (navigator.share) {
                try {
                    await navigator.share(shareData);
                    console.log('Successfully shared');
                } catch (err) {
                    console.log('Error sharing or user cancelled:', err);
                }
            } else {
                // Fallback for older browsers: Copy text to clipboard instead
                try {
                    await navigator.clipboard.writeText(`${shareData.title}\n${shareData.text}`);
                    fallbackMsg.style.display = 'block';
                    setTimeout(() => {
                        fallbackMsg.style.display = 'none';
                    }, 3000);
                } catch (err) {
                    console.error('Failed to copy text: ', err);
                }
            }
        });
    </script>
</body>
</html>
